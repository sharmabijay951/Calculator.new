            --primary: #00d09c;

            --text-dark: #2d2e32;
            --text-muted: #7c7e8c;
            --border: #ebedef;
            --hover-bg: #e8fcf6;
        }

        /* Anti-aliasing for smooth bold characters */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body { display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* --- 1. UNIVERSAL SIDEBAR (Exact Match to your Calculators) --- */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar-bg); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        /* Sidebar Header & Logo matching your screenshot[cite: 2, 4] */
        .sidebar-header { 
            padding: 30px 20px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            border-bottom: 1px solid #f8f9fa;
        }
        .logo-box { 
            background: var(--primary); 
            color: white; 
            padding: 10px 15px; 
            border-radius: 12px; 
            font-weight: 700; 
            font-size: 1.5rem; 
        }
        .logo-text h3 { font-size: 1.2rem; color: var(--text-dark); font-weight: 700; margin-bottom: -2px; }
        .logo-text p { font-size: 0.75rem; color: var(--text-muted); }

        .sidebar ul { list-style: none; padding: 20px 10px; }
        
        /* Bolder, Smoother Sidebar Links[cite: 3] */
        .sidebar li { margin-bottom: 5px; border-radius: 12px; transition: 0.2s; }
        
        .sidebar a { 
            text-decoration: none; 
            color: #7c7e8c; 
            display: block; 
            padding: 12px 15px; 
            font-size: 0.95rem; 
            font-weight: 500; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar li.active { background: #e8fcf6; }
        .sidebar li.active a { color: var(--primary); font-weight: 600; }
        
        .sidebar li:hover:not(.active) { background: #f8f9fa; }
        .sidebar li:hover a { color: var(--primary); padding-left: 20px; }

        /* --- 2. MAIN DASHBOARD CONTENT[cite: 3] --- */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; width: 100%; }
        .top-bar h2 { font-size: 1.8rem; color: #2d2e32; font-weight: 600; }
        .badge { background: white; padding: 8px 20px; border-radius: 30px; font-weight: bold; border: 1px solid var(--border); color: var(--primary); font-size: 0.9rem; }

        /* --- 3. DASHBOARD GRID (16 Calculators) --- */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); 
            gap: 25px; 
            width: 100%;
        }

        .calc-card { 
            background: white; 
            border-radius: 24px; 
            padding: 30px 20px; 
            text-align: center; 
            text-decoration: none; 
            border: 1px solid var(--border); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.04);
        }

        .calc-card:hover { transform: translateY(-12px); box-shadow: 0 15px 35px rgba(0,208,156,0.12); border-color: var(--primary); }
        .icon-box { width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; background: #f0fffb; border-radius: 16px; }
        .icon-box svg { width: 30px; height: 30px; fill: var(--primary); }
        
        .calc-card h4 { color: var(--text-dark); font-size: 1rem; font-weight: 600; }
        .calc-card .tag { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }

        /* Custom scrollbar for professional look[cite: 3] */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }

        @media (max-width: 900px) { .sidebar { display: none; } }
    </style>
</head>

    <script>
        // PERFECT MOBILE MENU LOGIC
        const sidebar = document.getElementById('sidebar');
        const menuBtn = document.getElementById('open-menu');

        if (menuBtn && sidebar) {
            menuBtn.onclick = function(e) {
                e.stopPropagation(); // Ye menu ko turant band hone se rokega
                sidebar.classList.toggle('active');
            };

            document.addEventListener('click', function(e) {
                // Agar click sidebar ke bahar hua hai aur menu button par nahi hua hai, tabhi band karo
                if (sidebar.classList.contains('active') && !sidebar.contains(e.target) && e.target !== menuBtn) {
                    sidebar.classList.remove('active');
                }
            });
        }
    </script>
